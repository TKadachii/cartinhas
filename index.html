<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteador de Cartinhas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2bd2ff 0%, #3a7bff 45%, #7b2bff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    color: #1a1a1a;
  }

  h1 {
    color: #fff;
    text-align: center;
    margin-bottom: 6px;
    font-size: clamp(22px, 5vw, 34px);
    text-shadow: 0 2px 6px rgba(0,0,0,.25);
  }

  .subtitle {
    color: #f0f4ff;
    text-align: center;
    margin-bottom: 26px;
    font-size: 15px;
    opacity: .95;
  }

  /* ---- Cartinha ---- */
  .scene {
    width: min(340px, 90vw);
    height: 470px;
    perspective: 1200px;
    margin-bottom: 26px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .7s cubic-bezier(.4,.2,.2,1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 26px;
    padding: 26px 22px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 14px 35px rgba(0,0,0,.28);
    overflow: hidden;
  }

  /* Frente (azul - pergunta) */
  .front {
    background: linear-gradient(160deg, #d6f0ff 0%, #b9e2ff 100%);
    border: 4px solid #4aa8ff;
  }

  /* Verso (verde - resposta) */
  .back {
    background: linear-gradient(160deg, #e6ffd6 0%, #cdf5b8 100%);
    border: 4px solid #7ad14a;
    transform: rotateY(180deg);
  }

  .badge {
    background: rgba(255,255,255,.55);
    border-radius: 16px;
    padding: 12px 14px;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 18px;
    line-height: 1.35;
  }
  .front .badge { color: #0b4a8a; }
  .back .badge  { color: #2f6b14; }

  .content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow-y: auto;
  }

  .question {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: bold;
    line-height: 1.45;
    color: #0b3c70;
    text-transform: uppercase;
  }

  .answer {
    font-size: clamp(13px, 3.6vw, 16px);
    font-weight: bold;
    line-height: 1.55;
    color: #2c5414;
    text-transform: uppercase;
  }

  .hint {
    text-align: center;
    font-size: 12px;
    opacity: .7;
    margin-top: 12px;
  }
  .front .hint { color: #0b4a8a; }
  .back .hint  { color: #2f6b14; }

  /* ---- Botões ---- */
  .buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    border: none;
    border-radius: 30px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,.25);
    transition: transform .12s, box-shadow .12s;
    color: #fff;
  }
  button:active { transform: translateY(2px); box-shadow: 0 3px 8px rgba(0,0,0,.25); }

  .btn-sortear { background: linear-gradient(135deg, #ff7eb3, #ff5e62); }
  .btn-virar   { background: linear-gradient(135deg, #43e97b, #38f9d7); color:#0a3d1f; }

  .counter {
    color: #fff;
    margin-top: 18px;
    font-size: 14px;
    opacity: .9;
  }
</style>
</head>
<body>

  <h1>🎴 Sorteador de Cartinhas</h1>
  <p class="subtitle">Toque na carta para virar • Sorteie uma nova a qualquer momento</p>

  <div class="scene">
    <div class="card" id="card" onclick="virar()">
      <!-- Frente: pergunta (azul) -->
      <div class="face front">
        <div class="badge" id="frontBadge"></div>
        <div class="content">
          <div class="question" id="questionText"></div>
        </div>
        <div class="hint">👆 toque para ver a resposta</div>
      </div>
      <!-- Verso: resposta (verde) -->
      <div class="face back">
        <div class="badge" id="backBadge"></div>
        <div class="content">
          <div class="answer" id="answerText"></div>
        </div>
        <div class="hint">👆 toque para voltar</div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn-sortear" onclick="sortear()">🔀 Sortear carta</button>
    <button class="btn-virar" onclick="virar()">🔄 Virar</button>
  </div>

  <p class="counter" id="counter"></p>

<script>
  // ====== EDITE AQUI: adicione quantas cartas quiser ======
  const cartas = [
    {
      frente: "Bloco 1 • Identificando os desafios da inclusão escolar",
      pergunta: "Como dar suporte a alunos com deficiência dentro do espaço escolar?",
      verso: "Bloco 2 • Identificando os suportes da inclusão escolar",
      resposta: "O aluno com deficiência precisa de apoio especializado para desenvolver a aprendizagem. A lei prevê currículos abertos e flexíveis, métodos, técnicas e recursos educativos específicos para atender as necessidades dos alunos com deficiência. O estudante também pode precisar de um mediador em sala."
    },
    {
      frente: "Bloco 1 • Pergunta",
      pergunta: "Escreva sua pergunta aqui",
      verso: "Bloco 2 • Resposta",
      resposta: "Escreva sua resposta aqui"
    }
  ];
  // =========================================================

  let atual = 0;

  function mostrar(i) {
    const c = cartas[i];
    document.getElementById('card').classList.remove('flipped');
    document.getElementById('frontBadge').textContent = c.frente;
    document.getElementById('questionText').textContent = c.pergunta;
    document.getElementById('backBadge').textContent = c.verso;
    document.getElementById('answerText').textContent = c.resposta;
    document.getElementById('counter').textContent = `Carta ${i + 1} de ${cartas.length}`;
  }

  function virar() {
    document.getElementById('card').classList.toggle('flipped');
  }

  function sortear() {
    if (cartas.length === 0) return;
    let nova;
    do { nova = Math.floor(Math.random() * cartas.length); }
    while (nova === atual && cartas.length > 1);
    atual = nova;
    mostrar(atual);
  }

  mostrar(atual);
</script>

</body>
</html>
