<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd3e0"/>
      <stop offset="0.4" stop-color="#b8e9ff"/>
      <stop offset="0.75" stop-color="#c7f5d4"/>
      <stop offset="1" stop-color="#fff3b0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- cartinha azul -->
  <g transform="rotate(-8 256 256)">
    <rect x="150" y="120" width="210" height="270" rx="34" fill="#bfe6ff" stroke="#5ab0ff" stroke-width="10" stroke-dasharray="16 12"/>
    <rect x="180" y="155" width="150" height="46" rx="16" fill="#ffffff" opacity="0.75"/>
    <line x1="180" y1="245" x2="330" y2="245" stroke="#5ab0ff" stroke-width="10" stroke-linecap="round"/>
    <line x1="180" y1="290" x2="330" y2="290" stroke="#5ab0ff" stroke-width="10" stroke-linecap="round"/>
    <line x1="180" y1="335" x2="290" y2="335" stroke="#5ab0ff" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- florzinha -->
  <g transform="translate(370 360)">
    <circle cx="0" cy="-26" r="18" fill="#ff8fc0"/>
    <circle cx="25" cy="-8" r="18" fill="#ff8fc0"/>
    <circle cx="15" cy="22" r="18" fill="#ff8fc0"/>
    <circle cx="-15" cy="22" r="18" fill="#ff8fc0"/>
    <circle cx="-25" cy="-8" r="18" fill="#ff8fc0"/>
    <circle cx="0" cy="0" r="16" fill="#fff3b0"/>
  </g>
  <!-- lapis -->
  <g transform="rotate(40 150 380)">
    <rect x="120" y="330" width="34" height="120" rx="6" fill="#ffd34d"/>
    <polygon points="120,330 154,330 137,300" fill="#ffe0a3"/>
    <polygon points="131,310 143,310 137,300" fill="#3a3a55"/>
    <rect x="120" y="438" width="34" height="14" fill="#ff8fc0"/>
  </g>
</svg>
